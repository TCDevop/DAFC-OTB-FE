# Deploy Next.js Standalone to Azure App Service
# Single-job design: build + deploy in one runner
# (avoids upload-artifact which drops hidden .next/ directory)

name: Build and deploy Node.js app to Azure Web App - buddyToolFEUat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build standalone output
        run: npm run build

      # postbuild (scripts/copy-assets.js) runs automatically after build
      # and copies public/ + .next/static/ into .next/standalone/

      - name: Prepare deployment package
        run: |
          # Copy standalone contents to deploy folder
          cp -a .next/standalone/. deploy/

          # Override package.json start script
          # On Azure, standalone contents are at wwwroot root (not nested under .next/standalone/)
          # So start script must be "node server.js"
          node -e "
            const pkg = require('./deploy/package.json');
            pkg.scripts = pkg.scripts || {};
            pkg.scripts.start = 'node server.js';
            require('fs').writeFileSync('./deploy/package.json', JSON.stringify(pkg, null, 2));
          "

          # Verify deployment package
          echo "=== Deployment package contents ==="
          ls -la deploy/
          echo "=== .next directory ==="
          ls -la deploy/.next/ || echo "WARNING: .next/ not found!"
          echo "=== BUILD_ID ==="
          cat deploy/.next/BUILD_ID || echo "WARNING: BUILD_ID not found!"
          echo "=== package.json start script ==="
          node -e "console.log(require('./deploy/package.json').scripts.start)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'buddyToolFEUat'
          slot-name: 'Production'
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8E0A5645F06C4A5FAC15CA672DD66B68 }}
